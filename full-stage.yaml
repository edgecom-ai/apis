openapi: 3.0.4

info:
  title: Edgecom Energy - pTrack API
  version: 1.0.0
  description: |
    pTrack APIs provide historical and forecasted data related to market demand and peak events, sourced from energy markets (ISO) and Edgecom Energy models.
    This includes: - Forecasted demand and actual demand - Coincident Peak probability - Historical Coincident Peak days - Forecasted peak events with their time windows - Historical peak demand curves - Latest weather data snapshots - Actual price data (day-ahead and five-minute resolution)
    Energy markets supported: - IESO (Ontario, Canada)
    See the Authorization section for details on the authentication method and how to obtain an authorization token.

servers:
  - url: https://dev.edgecomenergy.net
    description: Production

security:
  - ApiKeyAuth: []

tags:
  - name: IESO
    description: Ontario energy market endpoints.
  - name: Ontario Demand Response
    description: IESO Capacity Auction demand response endpoints.

paths:

  # ---------------------------------------------------------------------------
  # IESO — DEMAND
  # ---------------------------------------------------------------------------

  /ptrack/ieso/demand/actual/hourly:
    get:
      tags: [IESO]
      summary: IESO Actual Demand (Hourly)
      description: |
        Retrieves historical measured electricity demand for the Ontario power grid as published by IESO. The API returns time-series system load data for a selected time range and resolution, supporting operational analysis, benchmarking, and validation of forecast accuracy. This data can be used to compare actual demand against both ISO-published and pTrack-generated forecasts.
      operationId: getIesoDemandActualHourly
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
      responses:
        '200':
          description: IESO actual demand time series (hourly)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeSeriesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/demand/actual/five-minute:
    get:
      tags: [IESO]
      summary: IESO Actual Demand (5-Minute)
      description: |
        Retrieves historical measured electricity demand for the Ontario power grid as published by IESO. The API returns time-series system load data for a selected time range and resolution, supporting operational analysis, benchmarking, and validation of forecast accuracy. This data can be used to compare actual demand against both ISO-published and pTrack-generated forecasts.
      operationId: getIesoDemandActualFiveMinute
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
      responses:
        '200':
          description: IESO actual demand time series (5-minute)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeSeriesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/demand/projected/byIESO:
    get:
      tags: [IESO]
      summary: IESO Demand Forecast (by IESO)
      description: |
        Retrieves the official IESO-published system demand forecast for Ontario over a specified time range. This API allows users to access forward-looking electricity demand projections issued by IESO, as well as historical forecasts that were previously published for past periods. It enables analysis of expected system demand conditions and can be used alongside actual demand data to evaluate forecast accuracy and compare forecasted versus realized demand.
      operationId: getIesoDemandProjectedByIESO
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
      responses:
        '200':
          description: IESO demand forecast time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/demand/projected/bypTrack:
    get:
      tags: [IESO]
      summary: IESO Demand Forecast (by pTrack)
      description: |
        Provides system demand forecasts for Ontario generated by Edgecom Energy's pTrack forecasting models. These forecasts combine historical demand patterns, market data, and weather inputs to produce forward-looking demand projections. The API can also return historical forecast issues when available, allowing users to analyze how forecasts changed over time and compare pTrack predictions with IESO-published forecasts or actual system demand.
      operationId: getIesoDemandProjectedBypTrack
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
      responses:
        '200':
          description: pTrack demand forecast time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  # ---------------------------------------------------------------------------
  # IESO — PRICES
  # ---------------------------------------------------------------------------

  /ptrack/ieso/prices/actual/day-ahead:
    get:
      tags: [IESO]
      summary: IESO Actual Price (Day-Ahead)
      description: |
        Provides historical electricity price data for the IESO market, including both real-time and day-ahead market prices. Users can retrieve time-series price data for a specified time range to analyze price trends, evaluate market volatility, and support cost modeling or demand response planning. This API can be used alongside demand and peak analytics endpoints to better understand market behavior.
      operationId: getIesoPricesActualDayAhead
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
      responses:
        '200':
          description: IESO day-ahead price time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeSeriesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/prices/actual/real-time:
    get:
      tags: [IESO]
      summary: IESO Actual Price (Real-Time)
      description: |
        Provides historical electricity price data for the IESO market, including both real-time and day-ahead market prices. Users can retrieve time-series price data for a specified time range to analyze price trends, evaluate market volatility, and support cost modeling or demand response planning. This API can be used alongside demand and peak analytics endpoints to better understand market behavior.
      operationId: getIesoPricesActualRealTime
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
      responses:
        '200':
          description: IESO real-time (5-minute) price time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeSeriesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  # ---------------------------------------------------------------------------
  # IESO — PEAKS
  # ---------------------------------------------------------------------------

  /ptrack/ieso/peaks/probability/bypTrack:
    get:
      tags: [IESO]
      summary: Coincident Peak Probability
      description: |
        Returns the modeled probability that a given day will be a Coincident Peak day in the Ontario electricity market. The probability values range from 0 to 1 and reflect the estimated likelihood of a peak event based on demand forecasts, weather conditions, historical patterns, and market indicators. This insight helps organizations monitor peak risk and prepare operational strategies to reduce demand during potential peak events.
      operationId: getIesoPeaksProbabilityBypTrack
      parameters:
        - name: start
          in: query
          required: true
          description: Inclusive start date (YYYY-MM-DD).
          schema:
            type: string
            format: date
          example: "2026-02-24"
        - name: end
          in: query
          required: true
          description: Exclusive end date (YYYY-MM-DD). Must be after `start`.
          schema:
            type: string
            format: date
          example: "2026-02-28"
      responses:
        '200':
          description: Coincident peak probability time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbabilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/peaks/activation-days:
    get:
      tags: [IESO]
      summary: IESO Coincident Peak Days
      description: |
        Provides the historical calls of Coincident Peak by pTrack for a given year in the IESO market. The API returns the dates when system demand reached peak levels. This data supports retrospective analysis of peak seasons and enables organizations to benchmark their facility demand performance during actual peak events.
      operationId: getIesoPeaksActivationDays
      parameters:
        - $ref: '#/components/parameters/year'
      responses:
        '200':
          description: List of peak activation days
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeakActivationDaysResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/peaks/window/bypTrack:
    get:
      tags: [IESO]
      summary: Peak Event Window
      description: |
        Identifies the most likely peak-demand time window for a given day in the IESO market using pTrack's forecasting models. The API returns a predicted start and end time for the expected peak window along with the duration and optional confidence score. This information helps organizations plan load reductions or demand response strategies during the highest-risk peak hours.
      operationId: getIesoPeaksWindowBypTrack
      parameters:
        - $ref: '#/components/parameters/date'
      responses:
        '200':
          description: Peak event window for the requested date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeakWindowResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/peaks/demand-curve:
    get:
      tags: [IESO]
      summary: IESO Demand at Peak Days
      description: |
        Returns the demand curves for the highest peak demand days in the IESO market for a specified year. Each curve represents the full system load profile for a peak day, allowing users to analyze demand patterns, understand peak magnitude, and compare different peak events within the same year. This API supports deeper analysis of peak behavior and grid demand dynamics.
      operationId: getIesoPeaksDemandCurve
      parameters:
        - $ref: '#/components/parameters/year'
      responses:
        '200':
          description: Peak demand curves for the requested year
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeakDemandCurveResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  # ---------------------------------------------------------------------------
  # IESO — WEATHER
  # ---------------------------------------------------------------------------

  /ptrack/ieso/weather/latest:
    get:
      tags: [IESO]
      summary: IESO Latest Weather Parameters
      description: |
        Retrieves the most recent weather data snapshot used by pTrack analytics for the Ontario electricity market. This API provides a current observation of weather conditions that influence system demand forecasts and peak risk modeling. The response includes the timestamp of the observation, geographic location information, temperature, humidity, wind speed, and general weather conditions. Energy managers can use this data to understand the weather factors impacting electricity demand and peak risk signals, and to correlate real-time weather conditions with load forecasts and potential peak events.
      operationId: getIesoWeatherLatest
      responses:
        '200':
          description: Latest weather snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherSample'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  # ---------------------------------------------------------------------------
  # ONTARIO DEMAND RESPONSE
  # ---------------------------------------------------------------------------

  /demandresponse/ieso/properties:
    get:
      tags: [Ontario Demand Response]
      summary: List accessible Ontario properties
      description: |
        Returns the list of Ontario properties accessible to the calling API key.
        This endpoint resolves the properties associated with the caller and filters to Ontario,
        providing the location identifiers required for all other demand response endpoints.
        Call this endpoint first to discover which facilities are available for analysis.
      operationId: listIesoProperties
      responses:
        '200':
          description: Accessible Ontario properties
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertiesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /demandresponse/ieso/locations/{id}:
    get:
      tags: [Ontario Demand Response]
      summary: Get IESO location detail
      description: |
        Returns detailed information for a specific IESO location including zone, organization,
        committed capacity, contract details, and curtailment method.
        Use the property ID returned from the properties endpoint as the location identifier.
      operationId: getIesoLocation
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Location detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /demandresponse/ieso/locations/{id}/latest-status:
    get:
      tags: [Ontario Demand Response]
      summary: Get DR status for today and tomorrow
      description: |
        Returns the activation status for today and tomorrow for the specified location.
        Each day indicates whether the location is in standby, no activation, or activation state,
        and includes the activation window when applicable.
        This endpoint supports day-ahead operational awareness and readiness for demand response
        participants.
      operationId: getIesoLocationStatus
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Activation status for today and tomorrow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /demandresponse/ieso/locations/{id}/events:
    get:
      tags: [Ontario Demand Response]
      summary: Get event days for a location
      description: |
        Returns all demand response event days for the specified location, including activation
        windows for each event date. Each date maps to one or more time windows during which
        curtailment was required.
        This endpoint supports review of historical dispatch activity and planning for each
        market season.
      operationId: getIesoLocationEvents
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Event days with activation windows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDaysResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /demandresponse/ieso/locations/{id}/events/details:
    get:
      tags: [Ontario Demand Response]
      summary: Get detailed event records for a location
      description: |
        Returns detailed event records for the specified location, including precise start and
        end timestamps for each dispatch event. This data supports post-event analysis,
        settlement validation, and detailed review of curtailment periods.
      operationId: getIesoLocationEventDetails
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Detailed event records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetailsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /demandresponse/ieso/locations/curves:
    get:
      tags: [Ontario Demand Response]
      summary: Get demand curve for locations
      description: |
        Returns interval demand curves for one or more accessible IESO locations over a
        requested time range. This endpoint supports operational analysis, event review,
        and visualization of actual load behavior.
        It is useful for evaluating demand response performance and validating measured
        load reductions.
      operationId: getIesoLocationCurves
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
        - $ref: '#/components/parameters/locationIdsOptional'
        - $ref: '#/components/parameters/intervalMinutesOptional'
      responses:
        '200':
          description: Demand curve per location
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurveResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Provide your API key via header `X-API-Key`.

  parameters:
    start:
      name: start
      in: query
      required: true
      description: Inclusive start datetime (ISO 8601).
      schema:
        type: string
        format: date-time
      example: "2026-02-24T00:00:00-05:00"

    end:
      name: end
      in: query
      required: true
      description: Exclusive end datetime (ISO 8601). Must be after `start`.
      schema:
        type: string
        format: date-time
      example: "2026-02-25T00:00:00-05:00"

    date:
      name: date
      in: query
      required: true
      description: Date in `YYYY-MM-DD` format. Must be today or in the future.
      schema:
        type: string
        format: date
      example: "2026-07-15"

    year:
      name: year
      in: query
      required: true
      description: Year for annual peak-related queries.
      schema:
        type: integer
        minimum: 2000
        maximum: 2100
      example: 2025

    id:
      name: id
      in: path
      required: true
      description: Property ID of the location.
      schema:
        type: string
      example: "e2646a33-6c5d-4e75-89fc-696869fe0b6b"

    locationIdsOptional:
      name: location_ids
      in: query
      required: false
      description: Comma-separated property IDs. Returns all accessible Ontario locations if omitted.
      schema:
        type: string
      example: "e2646a33-6c5d-4e75-89fc-696869fe0b6b,d53a6193-5127-48e7-b34c-d2769b31261e"

    intervalMinutesOptional:
      name: interval_minutes
      in: query
      required: false
      description: Data aggregation interval in minutes. Defaults to 15.
      schema:
        type: integer
        enum: [5, 15, 60]
        default: 15
      example: 15

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    ServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: bad_request
            message:
              type: string
              example: end must be after start
            details:
              type: object
              additionalProperties: true

    Meta:
      type: object
      properties:
        market:
          type: string
          example: IESO
        region:
          type: string
          example: Ontario
        unit:
          type: string
          example: MW
        timezone:
          type: string
          example: America/Toronto
        source:
          type: string
          example: pTrack
        granularity:
          type: string
          example: 1h
        priceMarket:
          type: string
          nullable: true
          example: day_ahead
      additionalProperties: true

    TimeSeriesPoint:
      type: object
      required: [timestamp, value]
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number
          format: double

    TimeSeriesResponse:
      type: object
      required: [meta, data]
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/TimeSeriesPoint'

    ForecastPoint:
      type: object
      required: [timestamp, predicted]
      properties:
        timestamp:
          type: string
          format: date-time
        predicted:
          type: number
          format: double
        lower:
          type: number
          format: double
          nullable: true
        upper:
          type: number
          format: double
          nullable: true

    ForecastIssue:
      type: object
      required: [issuedAt, data]
      properties:
        issuedAt:
          type: string
          format: date-time
        data:
          type: array
          items:
            $ref: '#/components/schemas/ForecastPoint'

    ForecastResponse:
      type: object
      required: [meta, data]
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/ForecastPoint'
        history:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ForecastIssue'

    ProbabilityPoint:
      type: object
      required: [timestamp, probability]
      properties:
        timestamp:
          type: string
          format: date-time
        probability:
          type: number
          format: double
          minimum: 0
          maximum: 1

    ProbabilityResponse:
      type: object
      required: [meta, data]
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProbabilityPoint'

    PeakActivationDay:
      type: object
      required: [date, year]
      properties:
        date:
          type: string
          format: date
        year:
          type: integer
        windowStart:
          type: string
          format: date-time
          nullable: true
        windowEnd:
          type: string
          format: date-time
          nullable: true

    PeakActivationDaysResponse:
      type: object
      required: [meta, data]
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/PeakActivationDay'

    CurtailmentWindow:
      type: object
      required: [start_time, end_time]
      properties:
        start_time:
          type: integer
          minimum: 0
          maximum: 23
          example: 16
        end_time:
          type: integer
          minimum: 1
          maximum: 24
          example: 20

    PeakWindowResponse:
      type: object
      required: [result]
      properties:
        result:
          type: object
          required: [date, is_peak, chance_of_peak, message, curtailment_windows]
          properties:
            date:
              type: string
              format: date
              example: "2026-07-15"
            is_peak:
              type: boolean
              example: true
            chance_of_peak:
              type: integer
              minimum: 0
              maximum: 100
              nullable: true
              example: 92
            message:
              type: string
              example: the given day is a peak day
            curtailment_windows:
              type: object
              nullable: true
              required: [four_hour_window, two_hour_window]
              properties:
                four_hour_window:
                  nullable: true
                  allOf:
                    - $ref: '#/components/schemas/CurtailmentWindow'
                two_hour_window:
                  nullable: true
                  allOf:
                    - $ref: '#/components/schemas/CurtailmentWindow'

    PeakDemandCurveResponse:
      type: object
      required: [meta, series]
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        series:
          type: array
          items:
            type: object
            required: [label, data]
            properties:
              label:
                type: string
                example: Peak Day 1 - 2025-07-15
              data:
                type: array
                items:
                  $ref: '#/components/schemas/TimeSeriesPoint'

    WeatherSample:
      type: object
      required: [market, timestamp, location, temperatureC, humidityPct, windSpeedKph, conditions]
      properties:
        market:
          type: string
          example: IESO
        timestamp:
          type: string
          format: date-time
        location:
          type: object
          required: [name, lat, lon]
          properties:
            name:
              type: string
              example: Toronto
            lat:
              type: number
              format: double
            lon:
              type: number
              format: double
        temperatureC:
          type: number
          format: double
        humidityPct:
          type: number
          format: double
        windSpeedKph:
          type: number
          format: double
        conditions:
          type: string
          example: Cloudy

    # -------------------------------------------------------------------------
    # Ontario Demand Response schemas
    # -------------------------------------------------------------------------

    Property:
      type: object
      required: [id, name, province, city]
      properties:
        id:
          type: string
          example: "e2646a33-6c5d-4e75-89fc-696869fe0b6b"
        name:
          type: string
          example: "Ontario Demo"
        province:
          type: string
          example: Ontario
        city:
          type: string
          example: Toronto
        address:
          type: string
          example: "5775 Yonge St Unit 1902, Toronto, ON M7A 2J5, Canada"
        postal:
          type: string
          example: "M7A 2J5"

    PropertiesResponse:
      type: object
      required: [result]
      properties:
        result:
          type: array
          items:
            $ref: '#/components/schemas/Property'

    LocationResponse:
      type: object
      required: [result]
      properties:
        result:
          type: object
          properties:
            id:
              type: string
              example: "3a136e91-ad3e-4ad9-a3e2-aca6682cda7b"
            organization_id:
              type: string
              example: "a836ab23-3d29-46f5-ae37-e0f78156e080"
            organization_name:
              type: string
              example: "Edgecom Energy Inc"
            property_id:
              type: string
              example: "e2646a33-6c5d-4e75-89fc-696869fe0b6b"
            property_name:
              type: string
              example: "Ontario Demo"
            zone_id:
              type: string
              example: "3823591c-e366-4bc7-b426-b107970e1f24"
            contract_expiration:
              type: string
              format: date-time
              nullable: true
              example: "2026-02-14T00:00:00Z"
            curtailment_method:
              type: string
              example: "Turn it OFF in 24 hrs"
            spec:
              type: object
              properties:
                commitment_mw:
                  type: number
                  format: float
                  example: 1.26
                adjusted_capacity_mw:
                  type: number
                  format: float
                  example: 25

    DayStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [none, standby, activation]
          example: none
        window:
          nullable: true
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time

    ActivationStatusResponse:
      type: object
      required: [result]
      properties:
        result:
          type: object
          required: [today, tomorrow]
          properties:
            today:
              $ref: '#/components/schemas/DayStatus'
            tomorrow:
              $ref: '#/components/schemas/DayStatus'
            commitment_mw:
              type: number
              format: float
              example: 1.26
            adjusted_capacity_mw:
              type: number
              format: float
              example: 25
            curtailment_method:
              type: string
              example: "Turn it OFF in 24 hrs"
            number_of_events:
              type: integer
              example: 1

    EventDaysResponse:
      type: object
      required: [result]
      properties:
        result:
          type: object
          description: Map of date strings to arrays of time window strings.
          additionalProperties:
            type: array
            items:
              type: string
          example:
            "2025-12-16": ["4:00PM-7:00PM"]

    EventDetail:
      type: object
      required: [Date, Start, End, id]
      properties:
        Date:
          type: string
          format: date-time
          example: "2025-12-16T00:00:00Z"
        Start:
          type: string
          format: date-time
          example: "2025-12-16T16:00:00Z"
        End:
          type: string
          format: date-time
          example: "2025-12-16T19:00:00Z"
        id:
          type: string
          example: "72df530d-c706-4cdc-a15c-93d40865691f"

    EventDetailsResponse:
      type: object
      required: [result]
      properties:
        result:
          type: array
          items:
            $ref: '#/components/schemas/EventDetail'

    CurveInterval:
      type: object
      required: [timestamp, demand_mw]
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2025-12-16T00:00:00-05:00"
        demand_mw:
          type: number
          format: float
          description: Actual measured demand in MW
          example: 1.619

    LocationCurve:
      type: object
      required: [location_id, location_name, intervals]
      properties:
        location_id:
          type: string
          example: "e2646a33-6c5d-4e75-89fc-696869fe0b6b"
        location_name:
          type: string
          example: "Ontario Demo"
        intervals:
          type: array
          items:
            $ref: '#/components/schemas/CurveInterval'

    CurveResponse:
      type: object
      required: [start, end, interval_minutes, locations]
      properties:
        start:
          type: string
          format: date-time
          example: "2025-12-16T00:00:00-05:00"
        end:
          type: string
          format: date-time
          example: "2025-12-17T00:00:00-05:00"
        interval_minutes:
          type: integer
          enum: [5, 15, 60]
          example: 15
        locations:
          type: array
          items:
            $ref: '#/components/schemas/LocationCurve'
