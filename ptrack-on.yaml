openapi: 3.0.3

info:
  title: Edgecom Energy - pTrack API
  version: 1.0.0
  description: >
    pTrack APIs provide historical and forecasted data related to market demand and
    peak events, sourced from energy markets (ISO) and Edgecom Energy models.

    This includes:
    - Forecasted demand and actual demand
    - Coincident Peak probability
    - Historical Coincident Peak days
    - Forecasted peak events with their time windows
    - Historical peak demand curves
    - Latest weather data snapshots
    - Actual price data (day-ahead and five-minute resolution)

    Energy markets supported:
    - IESO (Ontario, Canada)

    See the Authorization section for details on the authentication method and how
    to obtain an authorization token.

servers:
  - url: https://api.edgecomenergy.net
    description: Production

security:
  - ApiKeyAuth: []

tags:
  - name: IESO
    description: Ontario energy market endpoints.

paths:
  /ptrack/ieso/demand/actual:
    get:
      tags:
        - IESO
      summary: IESO Actual Demand
      description: >
        Retrieves historical measured electricity demand for the Ontario power grid
        as published by IESO. The API returns time-series system load data for a
        selected time range and resolution, supporting operational analysis,
        benchmarking, and validation of forecast accuracy. This data can be used to
        compare actual demand against both ISO-published and pTrack-generated
        forecasts.
      operationId: getIesoDemandActual
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
        - $ref: '#/components/parameters/resolution'
      responses:
        '200':
          description: IESO actual demand time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeSeriesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/demand/projected/byIESO:
    get:
      tags:
        - IESO
      summary: IESO Demand Forecast (by IESO)
      description: >
        Retrieves the official IESO-published system demand forecast for Ontario
        over a specified time range. This API allows users to access forward-looking
        electricity demand projections issued by IESO, as well as historical
        forecasts that were previously published for past periods. It enables
        analysis of expected system demand conditions and can be used alongside
        actual demand data to evaluate forecast accuracy and compare forecasted
        versus realized demand.
      operationId: getIesoDemandProjectedByIESO
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
        - $ref: '#/components/parameters/resolution'
      responses:
        '200':
          description: IESO demand forecast time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/demand/projected/bypTrack:
    get:
      tags:
        - IESO
      summary: IESO Demand Forecast (by pTrack)
      description: >
        Provides system demand forecasts for Ontario generated by Edgecom Energy’s
        pTrack forecasting models. These forecasts combine historical demand
        patterns, market data, and weather inputs to produce forward-looking demand
        projections. The API can also return historical forecast issues when
        available, allowing users to analyze how forecasts changed over time and
        compare pTrack predictions with IESO-published forecasts or actual system
        demand.
      operationId: getIesoDemandProjectedBypTrack
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
        - $ref: '#/components/parameters/resolution'
      responses:
        '200':
          description: pTrack demand forecast time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/prices/actual:
    get:
      tags:
        - IESO
      summary: IESO Actual Price
      description: >
        Provides historical electricity price data for the IESO market, including
        both real-time and day-ahead market prices. Users can retrieve time-series
        price data for a specified time range to analyze price trends, evaluate
        market volatility, and support cost modeling or demand response planning.
        This API can be used alongside demand and peak analytics endpoints to
        better understand market behavior.
      operationId: getIesoPricesActual
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
        - $ref: '#/components/parameters/priceResolution'
      responses:
        '200':
          description: IESO actual price time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeSeriesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/peaks/probability/bypTrack:
    get:
      tags:
        - IESO
      summary: Coincident Peak Probability
      description: >
        Returns the modeled probability that a given day will be a Coincident Peak
        day in the Ontario electricity market. The probability values range from 0
        to 1 and reflect the estimated likelihood of a peak event based on demand
        forecasts, weather conditions, historical patterns, and market indicators.
        This insight helps organizations monitor peak risk and prepare operational
        strategies to reduce demand during potential peak events.
      operationId: getIesoPeaksProbabilityBypTrack
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
      responses:
        '200':
          description: Coincident peak probability time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbabilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/peaks/activation-days:
    get:
      tags:
        - IESO
      summary: IESO Coincident Peak Days
      description: >
        Provides the historical calls of Coincident Peak by pTrack for a given year
        in the IESO market. The API returns the dates when system demand reached
        peak levels. This data supports retrospective analysis of peak seasons and
        enables organizations to benchmark their facility demand performance during
        actual peak events.
      operationId: getIesoPeaksActivationDays
      parameters:
        - $ref: '#/components/parameters/year'
      responses:
        '200':
          description: List of peak activation days
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeakActivationDaysResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/peaks/window/bypTrack:
    get:
      tags:
        - IESO
      summary: Peak Event Window
      description: >
        Identifies the most likely peak-demand time window for a given day in the
        IESO market using pTrack’s forecasting models. The API returns a predicted
        start and end time for the expected peak window along with the duration and
        optional confidence score. This information helps organizations plan load
        reductions or demand response strategies during the highest-risk peak hours.
      operationId: getIesoPeaksWindowBypTrack
      parameters:
        - $ref: '#/components/parameters/start'
      responses:
        '200':
          description: Peak event window for the requested date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeakWindowResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/peaks/demand-curve:
    get:
      tags:
        - IESO
      summary: IESO Demand at Peak Days
      description: >
        Returns the demand curves for the highest peak demand days in the IESO
        market for a specified year. Each curve represents the full system load
        profile for a peak day, allowing users to analyze demand patterns,
        understand peak magnitude, and compare different peak events within the
        same year. This API supports deeper analysis of peak behavior and grid
        demand dynamics.
      operationId: getIesoPeaksDemandCurve
      parameters:
        - $ref: '#/components/parameters/year'
      responses:
        '200':
          description: Peak demand curves for the requested year
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeakDemandCurveResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /ptrack/ieso/weather/latest:
    get:
      tags:
        - IESO
      summary: IESO Latest Weather Parameters
      description: >
        Retrieves the most recent weather data snapshot used by pTrack analytics
        for the Ontario electricity market. This API provides a current observation
        of weather conditions that influence system demand forecasts and peak risk
        modeling. The response includes the timestamp of the observation,
        geographic location information, temperature, humidity, wind speed, and
        general weather conditions. Energy managers can use this data to understand
        the weather factors impacting electricity demand and peak risk signals, and
        to correlate real-time weather conditions with load forecasts and potential
        peak events.
      operationId: getIesoWeatherLatest
      responses:
        '200':
          description: Latest weather snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherSample'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Provide your API key via header `X-API-Key`.

  parameters:
    start:
      name: start
      in: query
      required: true
      description: Inclusive start datetime (ISO 8601).
      schema:
        type: string
        format: date-time
      example: '2026-02-24T00:00:00-05:00'

    end:
      name: end
      in: query
      required: true
      description: Exclusive end datetime (ISO 8601). Must be after `start`.
      schema:
        type: string
        format: date-time
      example: '2026-02-25T00:00:00-05:00'

    resolution:
      name: resolution
      in: query
      required: false
      description: Time resolution for returned data points. Defaults to hourly.
      schema:
        type: string
        enum:
          - five_minute
          - hourly
        default: hourly
      example: hourly

    priceResolution:
      name: resolution
      in: query
      required: false
      description: >
        Time resolution for price data. Use `five_minute` for 5-minute interval
        prices, or `day_ahead` for day-ahead market prices.
      schema:
        type: string
        enum:
          - five_minute
          - day_ahead
        default: day_ahead
      example: day_ahead

    year:
      name: year
      in: query
      required: true
      description: Year for annual peak-related queries.
      schema:
        type: integer
        minimum: 2000
        maximum: 2100
      example: 2025

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    ServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: bad_request
            message:
              type: string
              example: end must be after start
            details:
              type: object
              additionalProperties: true

    Meta:
      type: object
      properties:
        market:
          type: string
          example: IESO
        region:
          type: string
          description: Human-friendly region label.
          example: Ontario
        unit:
          type: string
          example: MW
        timezone:
          type: string
          example: America/Toronto
        source:
          type: string
          description: Data source (ISO or pTrack).
          example: pTrack
        granularity:
          type: string
          example: 1h
        priceMarket:
          type: string
          nullable: true
          example: day_ahead
      additionalProperties: true

    TimeSeriesPoint:
      type: object
      required:
        - timestamp
        - value
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number
          format: double

    TimeSeriesResponse:
      type: object
      required:
        - meta
        - data
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/TimeSeriesPoint'

    ForecastPoint:
      type: object
      required:
        - timestamp
        - predicted
      properties:
        timestamp:
          type: string
          format: date-time
        predicted:
          type: number
          format: double
        lower:
          type: number
          format: double
          nullable: true
        upper:
          type: number
          format: double
          nullable: true

    ForecastIssue:
      type: object
      required:
        - issuedAt
        - data
      properties:
        issuedAt:
          type: string
          format: date-time
        data:
          type: array
          items:
            $ref: '#/components/schemas/ForecastPoint'

    ForecastResponse:
      type: object
      required:
        - meta
        - data
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/ForecastPoint'
        history:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ForecastIssue'

    ProbabilityPoint:
      type: object
      required:
        - timestamp
        - probability
      properties:
        timestamp:
          type: string
          format: date-time
        probability:
          type: number
          format: double
          minimum: 0
          maximum: 1

    ProbabilityResponse:
      type: object
      required:
        - meta
        - data
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProbabilityPoint'

    PeakActivationDay:
      type: object
      required:
        - date
        - year
      properties:
        date:
          type: string
          format: date
        year:
          type: integer
        windowStart:
          type: string
          format: date-time
          nullable: true
        windowEnd:
          type: string
          format: date-time
          nullable: true

    PeakActivationDaysResponse:
      type: object
      required:
        - meta
        - data
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/PeakActivationDay'

    CurtailmentWindow:
      type: object
      required:
        - start_time
        - end_time
      properties:
        start_time:
          type: integer
          minimum: 0
          maximum: 23
          example: 16
        end_time:
          type: integer
          minimum: 1
          maximum: 24
          example: 20

    PeakWindowResponse:
      type: object
      required:
        - result
      properties:
        result:
          type: object
          required:
            - date
            - is_peak
            - chance_of_peak
            - message
            - curtailment_windows
          properties:
            date:
              type: string
              format: date
              example: '2026-07-15'
            is_peak:
              type: boolean
              example: true
            chance_of_peak:
              type: integer
              minimum: 0
              maximum: 100
              nullable: true
              example: 92
            message:
              type: string
              example: the given day is a peak day
            curtailment_windows:
              type: object
              nullable: true
              required:
                - four_hour_window
                - two_hour_window
              properties:
                four_hour_window:
                  nullable: true
                  allOf:
                    - $ref: '#/components/schemas/CurtailmentWindow'
                two_hour_window:
                  nullable: true
                  allOf:
                    - $ref: '#/components/schemas/CurtailmentWindow'

    PeakDemandCurveResponse:
      type: object
      required:
        - meta
        - series
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        series:
          type: array
          items:
            type: object
            required:
              - label
              - data
            properties:
              label:
                type: string
                example: Peak Day 1 - 2025-07-15
              data:
                type: array
                items:
                  $ref: '#/components/schemas/TimeSeriesPoint'

    WeatherSample:
      type: object
      required:
        - market
        - timestamp
        - location
        - temperatureC
        - humidityPct
        - windSpeedKph
        - conditions
      properties:
        market:
          type: string
          example: IESO
        timestamp:
          type: string
          format: date-time
        location:
          type: object
          required:
            - name
            - lat
            - lon
          properties:
            name:
              type: string
              example: Toronto
            lat:
              type: number
              format: double
            lon:
              type: number
              format: double
        temperatureC:
          type: number
          format: double
        humidityPct:
          type: number
          format: double
        windSpeedKph:
          type: number
          format: double
        conditions:
          type: string
          example: Cloudy
