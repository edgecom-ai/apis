openapi: 3.0.3

info:
  title: Edgecom Energy - pTrack API
  version: 1.0.0
  description: >
    pTrack APIs provide historical and forecasted data related to market demand and
    peak events for the IESO (Ontario, Canada).

servers:
  - url: https://api.edgecomenergy.net
    description: Production

security:
  - ApiKeyAuth: []

tags:
  - name: IESO
    description: Ontario energy market endpoints

paths:
  /ptrack/ieso/demand/actual:
    get:
      tags: [IESO]
      summary: IESO Actual Demand
      description: >
        Retrieves historical measured electricity demand for the Ontario power grid
        as published by IESO.
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
        - $ref: '#/components/parameters/resolution'
      responses:
        '200':
          description: IESO actual demand time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeSeriesResponse'

  /ptrack/ieso/demand/projected/byIESO:
    get:
      tags: [IESO]
      summary: IESO Demand Forecast (by IESO)
      description: >
        Retrieves the official IESO-published system demand forecast.
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
        - $ref: '#/components/parameters/resolution'
      responses:
        '200':
          description: IESO demand forecast
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastResponse'

  /ptrack/ieso/demand/projected/bypTrack:
    get:
      tags: [IESO]
      summary: IESO Demand Forecast (by pTrack)
      description: >
        Provides demand forecasts generated by pTrack models.
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
        - $ref: '#/components/parameters/resolution'
      responses:
        '200':
          description: pTrack forecast
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastResponse'

  /ptrack/ieso/prices/actual:
    get:
      tags: [IESO]
      summary: IESO Actual Price
      description: >
        Provides historical electricity price data for the IESO market.
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
        - $ref: '#/components/parameters/priceResolution'
      responses:
        '200':
          description: Price time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeSeriesResponse'

  /ptrack/ieso/peaks/probability/bypTrack:
    get:
      tags: [IESO]
      summary: Coincident Peak Probability
      description: >
        Returns the probability that a given day will be a Coincident Peak day.
      parameters:
        - $ref: '#/components/parameters/start'
        - $ref: '#/components/parameters/end'
      responses:
        '200':
          description: Peak probability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbabilityResponse'

  /ptrack/ieso/peaks/activation-days:
    get:
      tags: [IESO]
      summary: IESO Coincident Peak Days
      description: >
        Returns historical peak activation days for a given year.
      parameters:
        - $ref: '#/components/parameters/year'
      responses:
        '200':
          description: Peak days list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeakActivationDaysResponse'

  /ptrack/ieso/peaks/window/bypTrack:
    get:
      tags: [IESO]
      summary: Peak Event Window
      description: >
        Returns the predicted peak-demand time window for a given day.
      parameters:
        - $ref: '#/components/parameters/start'
      responses:
        '200':
          description: Peak window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeakWindowResponse'

  /ptrack/ieso/peaks/demand-curve:
    get:
      tags: [IESO]
      summary: IESO Demand at Peak Days
      description: >
        Returns demand curves for the highest peak demand days.
      parameters:
        - $ref: '#/components/parameters/year'
      responses:
        '200':
          description: Demand curves
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeakDemandCurveResponse'

  /ptrack/ieso/weather/latest:
    get:
      tags: [IESO]
      summary: IESO Latest Weather Snapshot
      description: >
        Retrieves the latest weather data snapshot for the IESO region.
      responses:
        '200':
          description: Weather snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherSample'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    start:
      name: start
      in: query
      required: true
      schema:
        type: string
        format: date-time

    end:
      name: end
      in: query
      required: true
      schema:
        type: string
        format: date-time

    resolution:
      name: resolution
      in: query
      schema:
        type: string
        enum: [five_minute, hourly]
        default: hourly

    priceResolution:
      name: resolution
      in: query
      schema:
        type: string
        enum: [five_minute, day_ahead]
        default: day_ahead

    year:
      name: year
      in: query
      required: true
      schema:
        type: integer

  schemas:
    TimeSeriesPoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number

    TimeSeriesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TimeSeriesPoint'

    ForecastPoint:
      type: object
      properties:
        timestamp:
          type: string
        predicted:
          type: number

    ForecastResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ForecastPoint'

    ProbabilityResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
              probability:
                type: number

    PeakActivationDaysResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              date:
                type: string

    PeakWindowResponse:
      type: object
      properties:
        result:
          type: object

    PeakDemandCurveResponse:
      type: object
      properties:
        series:
          type: array
          items:
            type: object

    WeatherSample:
      type: object
      properties:
        timestamp:
          type: string
        temperatureC:
          type: number
